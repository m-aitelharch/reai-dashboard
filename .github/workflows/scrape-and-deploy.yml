name: Scrape & Deploy

on:
  workflow_dispatch: # manual trigger only — schedule disabled until further notice

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser

      - name: Install scraper dependencies
        working-directory: scripts
        run: npm install

      - name: Run scrapers
        working-directory: scripts
        run: node scrape.js
        env:
          NODE_OPTIONS: '--max-old-space-size=512'
          CHROMIUM_PATH: /usr/bin/chromium-browser

      - name: Install app dependencies
        working-directory: reai-app
        run: npm install

      - name: Build app
        working-directory: reai-app
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reai-app/dist
          publish_branch: gh-pages
          commit_message: 'chore: update listings [${{ github.run_id }}]'

      - name: Commit updated seed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reai-app/src/data/seed-properties.json reai-app/public/properties.json
          git diff --staged --quiet || git commit -m "chore: update seed properties [skip ci]"
          git push
